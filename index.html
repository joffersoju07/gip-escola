<!DOCTYPE html>
<html>
<head>
  <base target="_top">
<style>
    body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; padding: 15px; text-align: center; font-size: 18px; }
    .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: auto; }
    .hidden { display: none !important; }
    .btn { width: 100%; padding: 18px; margin-top: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 18px; text-transform: uppercase; color: white; }
    .btn-blue { background: #22c55e; box-shadow: 0 4px 0 #16a34a; }
    .btn-secondary { background: #3b82f6; box-shadow: 0 4px 0 #2563eb; }
    .btn-voltar { background: #fb7185; box-shadow: 0 4px 0 #e11d48; }
    label { font-weight: bold; display: block; margin: 20px 0 8px; text-align: left; }
    select, textarea, input { width: 100%; padding: 16px; border: 2px solid #3b82f6; border-radius: 8px; font-size: 18px; box-sizing: border-box; }
    #btn-mic.gravando { background: #fee2e2 !important; border-color: #ef4444 !important; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 2px solid #3b82f6; }
    th { background: #3b82f6; color: white; padding: 10px; }
    td { border: 1px solid #ddd; padding: 10px; }
</style>
</head>
<body>

  <div id="tela-load" class="container">
    <h2>Sistema Escolar</h2>
    <p>⏳ Sincronizando dados...</p>
  </div>

  <div id="tela-menu" class="container hidden">
    <div style="background: #fef3c7; padding: 8px; border-radius: 20px; font-weight: bold; margin-bottom: 15px;">MODO: PROFESSOR</div>
    <button class="btn btn-blue" onclick="irPara('tela-form')">Nova Ocorrência</button>
    <button class="btn btn-secondary" onclick="irPara('tela-rel')">Painel de Pendências</button>
  </div>

  <div id="tela-form" class="container hidden">
    <h2>Novo Registro</h2>
    <label>Turma</label><select id="f-turma" onchange="buscarAlunos()"></select>
    <label>Disciplina</label><select id="f-disc"></select>
    <label>Aluno</label><select id="f-aluno"></select>
    <label>Relato</label>
    <div style="display: flex; gap: 10px;">
      <textarea id="f-texto" placeholder="Fale ou digite..." rows="4"></textarea>
      <button id="btn-mic" onclick="iniciarDitado()" style="font-size:30px; width:60px; border-radius:12px; border:2px solid #3b82f6; cursor:pointer">🎤</button>
    </div>
    <button class="btn btn-blue" onclick="salvar()">GRAVAR</button>
    <button class="btn btn-voltar" onclick="irPara('tela-menu')">VOLTAR</button>
  </div>

  <div id="tela-rel" class="container hidden">
    <h2>Relatório</h2>
    <select id="r-turma" onchange="gerarTabela()"></select>
    <div id="div-tabela"></div>
    <button class="btn btn-voltar" onclick="irPara('tela-menu')">VOLTAR</button>
  </div>

<script>
    // PASSO FINAL: COLE SEU LINK DO GOOGLE ABAIXO
    const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbzxkhQ2X7EgDhIENx9C9iZw4j_4wat84pXbAKfZhY5YuwidphZa4KMBcLTpVbTnf7tfWw/exec"; 

    async function falarComGoogle(acao, params = {}) {
        const r = await fetch(URL_GOOGLE, { method: 'POST', body: JSON.stringify({ acao, params }) });
        return await r.json();
    }

    window.onload = async () => {
        try {
            const res = await fetch(URL_GOOGLE).then(r => r.json());
            popularSelect('f-turma', res.turmas);
            popularSelect('r-turma', res.turmas);
            popularSelect('f-disc', res.disciplinas);
            document.getElementById('tela-load').classList.add('hidden');
            document.getElementById('tela-menu').classList.remove('hidden');
        } catch (e) { alert("Erro de conexão com a planilha!"); }
    };

    function irPara(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function popularSelect(id, lista) {
        let h = '<option value="">Selecione...</option>';
        lista.forEach(i => h += `<option value="${i}">${i}</option>`);
        document.getElementById(id).innerHTML = h;
    }

    async function buscarAlunos() {
        const t = document.getElementById('f-turma').value;
        const res = await falarComGoogle("getDadosFiltradosPorTurma", {turma: t});
        let h = '<option value="">Escolha o aluno</option>';
        res.alunos.forEach(a => h += `<option value="${a}">${a}</option>`);
        document.getElementById('f-aluno').innerHTML = h;
    }

    async function salvar() {
        const d = { turma: document.getElementById('f-turma').value, disciplina: document.getElementById('f-disc').value, aluno: document.getElementById('f-aluno').value, texto: document.getElementById('f-texto').value };
        await falarComGoogle("salvarOcorrencia", {dados: d});
        alert("Salvo!");
        irPara('tela-menu');
    }

    function iniciarDitado() {
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Recognition) return alert("Use o Chrome!");
        const rec = new Recognition();
        rec.lang = 'pt-BR';
        rec.onstart = () => document.getElementById('btn-mic').classList.add('gravando');
        rec.onend = () => document.getElementById('btn-mic').classList.remove('gravando');
        rec.onresult = (e) => { document.getElementById('f-texto').value += e.results[0][0].transcript + " "; };
        rec.start();
    }

    async function gerarTabela() {
        const t = document.getElementById('r-turma').value;
        const res = await falarComGoogle("getDadosRelatorio", {turma: t});
        let h = '<table><tr><th>ALUNO</th>';
        res.cabecalho.forEach(c => h += `<th>${c.substring(0,3)}</th>`);
        h += '</tr>';
        for(let a in res.corpo) {
            h += `<tr><td>${a}</td>`;
            res.cabecalho.forEach(c => h += `<td>${res.corpo[a][c] || ''}</td>`);
            h += '</tr>';
        }
        document.getElementById('div-tabela').innerHTML = h + '</table>';
    }
</script>
</body>
</html>
